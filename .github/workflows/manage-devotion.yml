name: Manage Devotion

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run management action
        id: manage
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/manage-devotion.js
        continue-on-error: true

      - name: Check if this issue was a management action
        id: check
        run: |
          if [ ! -f .manage-result ] && [ ! -f .manage-error ]; then
            echo "not_management=true" >> "$GITHUB_OUTPUT"
          else
            echo "not_management=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.not_management == 'false' && steps.manage.outcome == 'success'
        run: |
          git config user.name "devotion-bot"
          git config user.email "actions@github.com"
          git add docs/devotions/devotions.json
          git diff --staged --quiet || git commit -m "Manage devotion via issue #${{ github.event.issue.number }}"
          git push

      - name: Comment success and close
        if: steps.check.outputs.not_management == 'false' && steps.manage.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const msg = fs.readFileSync('.manage-result', 'utf-8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ ${msg}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed"
            });

      - name: Comment failure
        if: steps.check.outputs.not_management == 'false' && steps.manage.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const msg = fs.readFileSync('.manage-error', 'utf-8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ ${msg}`
            });
